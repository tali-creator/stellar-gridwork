name: PR Check

# Runs all three CI pipelines against every PR targeting main or develop,
# regardless of which paths changed. This ensures the merge commit is always
# fully green before review.
on:
  pull_request:
    branches: [main, develop]

jobs:
  frontend:
    name: Frontend — lint, type-check & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit
      - run: npm run build
        env:
          CI: true

  backend:
    name: Backend — fmt, clippy & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      CARGO_TERM_COLOR: always
      CARGO_INCREMENTAL: "0"
      RUSTFLAGS: "-D warnings"

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend

      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets --all-features
      - run: cargo test --all-features

  contracts:
    name: Contracts — fmt, clippy, test & WASM build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    env:
      CARGO_TERM_COLOR: always
      CARGO_INCREMENTAL: "0"
      RUSTFLAGS: "-D warnings"

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: contracts

      - name: Install Stellar CLI
        run: cargo install --locked stellar-cli --features opt

      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets --all-features
      - run: cargo test --all-features
      - run: stellar contract build

  # Single required status check — add this one to branch protection rules.
  # It only passes when all three jobs above pass.
  all-checks:
    name: All checks passed
    needs: [frontend, backend, contracts]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Verify all jobs succeeded
        run: |
          if [[ "${{ needs.frontend.result }}" != "success" || \
                "${{ needs.backend.result }}" != "success" || \
                "${{ needs.contracts.result }}" != "success" ]]; then
            echo "One or more CI jobs failed."
            exit 1
          fi
          echo "All checks passed."
